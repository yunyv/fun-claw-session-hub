openapi: 3.1.0
info:
  title: FunClaw Session Hub HTTP API
  version: 1.0.0-mvp
  summary: FunClaw / OpenClaw Session Hub MVP 协作接口
  description: |
    这是当前 FunClaw Session Hub MVP 的 HTTP OpenAPI 描述文件。

    适用范围：
    - Hub 健康检查
    - Worker 状态查询
    - session 声明
    - message 提交
    - request 轮询 / await
    - session.history.get 的 HTTP 代理面
    - artifact 元数据与内容下载

    不在 OpenAPI 标准内完整描述的部分：
    - `GET /ws` 的 WebSocket 升级握手
    - Hub WS 帧格式
    - Worker / Adapter 的 WS 事件与 RPC 方法

    这些内容仍以 `Funclaw/实现方案2-session-hub版.md` 和 `src/funclaw/contracts/schema.ts`
    为准。
servers:
  - url: http://127.0.0.1:31880
    description: 本地 / 隧道内访问
  - url: http://47.118.27.59:31880
    description: 中转机公网入口
tags:
  - name: health
    description: 存活与就绪检查
  - name: workers
    description: Worker 在线状态
  - name: sessions
    description: Session 绑定与消息提交
  - name: requests
    description: Request 状态查询与等待
  - name: artifacts
    description: Artifact 元数据与内容下载
  - name: websocket
    description: WebSocket 升级入口说明
paths:
  /healthz:
    get:
      tags: [health]
      operationId: getHealthz
      summary: Hub 存活检查
      responses:
        '200':
          description: Hub 进程存活
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                ok: true
                status: live
  /readyz:
    get:
      tags: [health]
      operationId: getReadyz
      summary: Hub 就绪检查
      description: 至少有 1 台 Worker 在线时返回 200，否则返回 503。
      responses:
        '200':
          description: Hub 已就绪
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
              example:
                ok: true
                status: ready
                workers_online: 1
        '503':
          description: Hub 存活但还没有可用 Worker
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
              example:
                ok: false
                status: not_ready
                workers_online: 0
  /ws:
    get:
      tags: [websocket]
      operationId: getWsUpgradeInfo
      summary: Hub WebSocket 升级入口
      description: |
        这是 Hub 的 WebSocket 升级地址。

        普通 HTTP GET 调用会返回 `426 Upgrade Required`。
        实际长连协议、首帧 `connect` 握手、`task.assigned`、`artifact.register`
        等 WS 帧，请参考：
        - `Funclaw/实现方案2-session-hub版.md`
        - `src/funclaw/contracts/schema.ts`
      responses:
        '426':
          description: 需要使用 WebSocket Upgrade
          content:
            text/plain:
              schema:
                type: string
                const: Upgrade Required
  /api/v1/workers:
    get:
      tags: [workers]
      operationId: listWorkers
      summary: 查询当前在线 Worker
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功返回 Worker 列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkersResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /api/v1/sessions:
    post:
      tags: [sessions]
      operationId: createOrBindSession
      summary: 声明或创建 session
      description: |
        - 若 `session_id` 尚未绑定，Hub 会选择一台在线 Worker 建立粘性路由
        - 若 `session_id` 已存在，则直接返回既有绑定
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionBody'
            example:
              session_id: conversation-123
              adapter_id: funclaw-sidecar-a
              openclaw_session_key: funclaw:conversation-123
      responses:
        '200':
          description: 成功创建或命中既有 session 绑定
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateSessionResponse'
        '400':
          $ref: '#/components/responses/InvalidRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '503':
          description: 当前没有可用 Worker
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                ok: false
                error:
                  code: NO_WORKER
                  message: No online worker available for new sessions
  /api/v1/sessions/{sessionId}/messages:
    post:
      tags: [sessions]
      operationId: postSessionMessage
      summary: 向指定 session 提交一次任务
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostSessionMessageBody'
            examples:
              responsesCreate:
                summary: 文本消息
                value:
                  adapter_id: funclaw-sidecar-a
                  openclaw_session_key: funclaw:conversation-123
                  action: responses.create
                  input:
                    model: openclaw
                    input: 你好
                    stream: false
              historyGet:
                summary: 历史查询任务
                value:
                  adapter_id: funclaw-sidecar-a
                  openclaw_session_key: funclaw:conversation-123
                  action: session.history.get
                  input:
                    limit: 20
              nodeInvoke:
                summary: node.invoke 透传
                value:
                  adapter_id: funclaw-sidecar-a
                  openclaw_session_key: funclaw:conversation-123
                  action: node.invoke
                  input:
                    node_id: camera
                    method: camera.snap
      responses:
        '202':
          description: 请求已入队并已投递给绑定 Worker
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestEnvelope'
        '400':
          $ref: '#/components/responses/InvalidRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '503':
          description: 当前请求无法被 Hub 接受或路由
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                ok: false
                error:
                  code: REQUEST_REJECTED
                  message: Worker offline for session conversation-123
  /api/v1/sessions/{sessionId}/history:
    get:
      tags: [sessions]
      operationId: getSessionHistory
      summary: 获取 session 历史
      description: |
        Hub 会把这个 HTTP 请求转成一次 `session.history.get` 任务，再由绑定 Worker
        调用本机 OpenClaw `GET /sessions/{sessionKey}/history`。

        当前实现会把 query string 原样透传给 Worker，因此除 `limit` / `cursor` 之外，
        也允许将来扩展其他查询参数。
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SessionId'
        - name: limit
          in: query
          required: false
          schema:
            oneOf:
              - type: integer
                minimum: 0
              - type: string
          description: 透传给 OpenClaw 的历史条数参数
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: 透传给 OpenClaw 的游标参数
      responses:
        '200':
          description: 历史查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoryResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: session 不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '502':
          description: 上游 Worker / OpenClaw 历史查询失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Hub 无法受理此请求
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '504':
          description: 历史查询超时
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/requests/{requestId}:
    get:
      tags: [requests]
      operationId: getRequest
      summary: 查询 request 当前状态
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RequestId'
      responses:
        '200':
          description: 成功返回 request 快照
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: request 不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/requests/{requestId}/await:
    post:
      tags: [requests]
      operationId: awaitRequest
      summary: 阻塞等待 request 进入终态
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RequestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AwaitRequestBody'
            example:
              timeout_ms: 30000
      responses:
        '200':
          description: request 已完成、失败或取消
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AwaitRequestResponse'
        '202':
          description: 在给定超时时间内未进入终态
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AwaitRequestResponse'
              example:
                ok: false
                request:
                  request_id: req_123
                  session_id: conversation-123
                  worker_id: openclaw-main-1
                  adapter_id: funclaw-sidecar-a
                  openclaw_session_key: funclaw:conversation-123
                  action: responses.create
                  input: {}
                  status: running
                  created_at: '2026-04-15T08:00:00.000Z'
                  updated_at: '2026-04-15T08:00:01.000Z'
                  accepted_at: '2026-04-15T08:00:01.000Z'
                  outputs: []
                  artifacts: []
        '400':
          $ref: '#/components/responses/InvalidRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: request 不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/artifacts/{artifactId}:
    get:
      tags: [artifacts]
      operationId: getArtifact
      summary: 查询 artifact 元数据
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ArtifactId'
      responses:
        '200':
          description: 成功返回 artifact 元数据
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: artifact 不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/artifacts/{artifactId}/content:
    get:
      tags: [artifacts]
      operationId: getArtifactContent
      summary: 下载 artifact 二进制内容
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ArtifactId'
      responses:
        '200':
          description: 成功返回二进制内容
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: artifact 或正文不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '501':
          description: 当前 artifact transport 尚未实现
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: FUNCLAW_HUB_TOKEN
  parameters:
    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
      description: FunClaw 侧逻辑 session_id
    RequestId:
      name: requestId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
      description: Hub 内 request_id
    ArtifactId:
      name: artifactId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
      description: Hub 内 artifact_id
  responses:
    UnauthorizedError:
      description: Bearer token 缺失或错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            ok: false
            error:
              code: UNAUTHORIZED
              message: Missing or invalid bearer token
    InvalidRequestError:
      description: 请求体或参数校验失败
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            ok: false
            error:
              code: INVALID_REQUEST
              message: Invalid request body
  schemas:
    ErrorShape:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        details: {}
        retryable:
          type: boolean
    ErrorEnvelope:
      type: object
      additionalProperties: false
      required: [ok, error]
      properties:
        ok:
          type: boolean
          const: false
        error:
          $ref: '#/components/schemas/ErrorShape'
    HealthResponse:
      type: object
      additionalProperties: false
      required: [ok, status]
      properties:
        ok:
          type: boolean
          const: true
        status:
          type: string
          const: live
    ReadyResponse:
      type: object
      additionalProperties: false
      required: [ok, status, workers_online]
      properties:
        ok:
          type: boolean
        status:
          type: string
          enum: [ready, not_ready]
        workers_online:
          type: integer
          minimum: 0
    WorkerStatus:
      type: object
      additionalProperties: false
      required:
        - workerId
        - hostname
        - version
        - capabilities
        - connectedAt
        - lastHeartbeatAt
      properties:
        workerId:
          type: string
        hostname:
          type: string
        version:
          type: string
        capabilities:
          type: array
          items:
            type: string
        connectedAt:
          type: string
          format: date-time
        lastHeartbeatAt:
          type: string
          format: date-time
    WorkersResponse:
      type: object
      additionalProperties: false
      required: [ok, workers]
      properties:
        ok:
          type: boolean
          const: true
        workers:
          type: array
          items:
            $ref: '#/components/schemas/WorkerStatus'
    SessionRouteStatus:
      type: string
      enum: [bound, worker_offline]
    SessionRouteRecord:
      type: object
      additionalProperties: false
      required:
        - session_id
        - worker_id
        - adapter_id
        - openclaw_session_key
        - status
        - created_at
        - last_seen_at
      properties:
        session_id:
          type: string
        worker_id:
          type: string
        adapter_id:
          type: string
        openclaw_session_key:
          type: string
        status:
          $ref: '#/components/schemas/SessionRouteStatus'
        created_at:
          type: string
          format: date-time
        last_seen_at:
          type: string
          format: date-time
        last_request_id:
          type: string
    CreateSessionBody:
      type: object
      additionalProperties: false
      required: [session_id]
      properties:
        session_id:
          type: string
          minLength: 1
        adapter_id:
          type: string
          minLength: 1
        openclaw_session_key:
          type: string
          minLength: 1
    CreateSessionResponse:
      type: object
      additionalProperties: false
      required: [ok, session]
      properties:
        ok:
          type: boolean
          const: true
        session:
          $ref: '#/components/schemas/SessionRouteRecord'
    TaskAction:
      type: string
      enum:
        - responses.create
        - session.history.get
        - node.invoke
    PostSessionMessageBody:
      type: object
      additionalProperties: false
      required: [action, input]
      properties:
        request_id:
          type: string
          minLength: 1
        adapter_id:
          type: string
          minLength: 1
        openclaw_session_key:
          type: string
          minLength: 1
        action:
          $ref: '#/components/schemas/TaskAction'
        input: {}
    RequestStatus:
      type: string
      enum: [queued, running, completed, failed, canceled]
    TaskOutputPayload:
      type: object
      additionalProperties: false
      required: [request_id, output_index, output, emitted_at]
      properties:
        request_id:
          type: string
        output_index:
          type: integer
          minimum: 0
        output: {}
        emitted_at:
          type: string
          format: date-time
    ArtifactTransport:
      type: string
      enum: [inline, hub_file, object_store]
    ArtifactKind:
      type: string
      enum: [image, video, audio, file, json]
    ArtifactDescriptor:
      type: object
      additionalProperties: false
      required:
        - artifact_id
        - kind
        - filename
        - mime_type
        - size_bytes
        - sha256
        - transport
      properties:
        artifact_id:
          type: string
        kind:
          $ref: '#/components/schemas/ArtifactKind'
        filename:
          type: string
        mime_type:
          type: string
        size_bytes:
          type: integer
          minimum: 0
        sha256:
          type: string
        transport:
          $ref: '#/components/schemas/ArtifactTransport'
        inline_base64:
          type: string
        download_url:
          type: string
        expires_at:
          type: string
          format: date-time
        meta:
          type: object
          additionalProperties: true
    RequestRecord:
      type: object
      additionalProperties: false
      required:
        - request_id
        - session_id
        - worker_id
        - adapter_id
        - openclaw_session_key
        - action
        - input
        - status
        - created_at
        - updated_at
        - outputs
        - artifacts
      properties:
        request_id:
          type: string
        session_id:
          type: string
        worker_id:
          type: string
        adapter_id:
          type: string
        openclaw_session_key:
          type: string
        action:
          $ref: '#/components/schemas/TaskAction'
        input: {}
        status:
          $ref: '#/components/schemas/RequestStatus'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        accepted_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
        outputs:
          type: array
          items:
            $ref: '#/components/schemas/TaskOutputPayload'
        result: {}
        artifacts:
          type: array
          items:
            $ref: '#/components/schemas/ArtifactDescriptor'
        error:
          $ref: '#/components/schemas/ErrorShape'
    RequestEnvelope:
      type: object
      additionalProperties: false
      required: [ok, request]
      properties:
        ok:
          type: boolean
          const: true
        request:
          $ref: '#/components/schemas/RequestRecord'
    AwaitRequestBody:
      type: object
      additionalProperties: false
      properties:
        timeout_ms:
          type: integer
          minimum: 0
    AwaitRequestResponse:
      type: object
      additionalProperties: false
      required: [ok, request]
      properties:
        ok:
          type: boolean
        request:
          $ref: '#/components/schemas/RequestRecord'
    HistoryResponse:
      type: object
      additionalProperties: false
      required: [ok, request_id, result]
      properties:
        ok:
          type: boolean
          const: true
        request_id:
          type: string
        result: {}
    ArtifactEnvelope:
      type: object
      additionalProperties: false
      required: [ok, artifact]
      properties:
        ok:
          type: boolean
          const: true
        artifact:
          $ref: '#/components/schemas/ArtifactDescriptor'
